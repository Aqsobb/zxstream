<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQSO STREAM - Donghua Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #040712; color: #f1f5f9; }
        .premium-glass { background: rgba(11, 17, 34, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.02); }
    </style>
</head>
<body class="bg-[#040712]">

    <!-- NAVBAR USER -->
    <nav class="premium-glass sticky top-0 z-50 px-4 py-3 border-b border-slate-900/50 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-3" onclick="window.location.reload()" style="cursor: pointer;">
            <div class="w-8 h-8 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center">
                <i class="fa-solid fa-play text-white text-xs"></i>
            </div>
            <div class="flex flex-col">
                <span class="text-sm font-extrabold tracking-tight text-white">AQSO STREAM</span>
                <div class="flex items-center gap-1.5">
                    <span id="dotIndicator" class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span id="engineStatusIndicator" class="text-[9px] font-medium text-slate-400">Sinkronisasi Aktif</span>
                </div>
            </div>
        </div>
        <div>
            <button onclick="alert('Login Demo')" class="bg-slate-900 border border-slate-800 text-slate-200 text-[11px] font-semibold px-3 py-2 rounded-xl">Masuk</button>
        </div>
    </nav>

    <!-- KONTEN UTAMA -->
    <main class="max-w-md mx-auto p-4 pb-24">
        <div class="mb-5 relative flex items-center">
            <i class="fa-solid fa-magnifying-glass absolute left-4 text-slate-400 text-sm"></i>
            <input id="searchQuery" type="text" placeholder="Cari donghua kesukaanmu..." class="w-full bg-[#0a0f24] border border-slate-850 rounded-xl pl-11 pr-20 py-3.5 text-xs text-white outline-none">
            <button onclick="executeSearchAction()" class="absolute right-2 bg-indigo-600 px-4 py-2 rounded-lg text-xs font-bold text-white">Cari</button>
        </div>

        <div id="loadingState" class="text-center py-24">
            <div class="w-9 h-9 rounded-full border-4 border-indigo-500/10 border-t-indigo-500 animate-spin inline-block mb-3"></div>
            <p class="text-xs font-semibold text-slate-400">Menghubungkan ke API Cluster...</p>
        </div>

        <div id="dynamicViewport" class="hidden space-y-6">
            <div>
                <h3 id="feedSectionTitle" class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-bolt text-amber-500"></i> <span id="titleText">Rilis Donghua Terkini</span>
                </h3>
                <div id="contentFeedGrid" class="grid grid-cols-2 gap-3"></div>
            </div>
        </div>
    </main>

    <!-- ========================================================== -->
    <!-- 🔥 SEKTOR PENGATURAN DOMAIN & AUTO-SCRAPE (UBAH DI SINI) 🔥 -->
    <!-- ========================================================== -->
    <script>
        // 1. LINK BACKEND HUGGING FACE LU
        const BACKEND_API = "https://anggasi-aip.hf.space/api/v1/scrape?query=";

        // 2. DOMAIN / KEYWORD TARGET YANG MAU DI-SCRAPE OTOMATIS
        const TARGET_SCRAPE = "https://anichin.moe/"; 

        // 3. PENGATURAN AUTO-REFRESH SINKRONISASI 
        const AUTO_REFRESH_ACTIVE = true; // Ganti 'false' jika mau dimatikan
        const REFRESH_INTERVAL_MS = 30000; // Auto-update tiap 30 detik
    </script>
    <!-- ========================================================== -->

    <!-- ENGINE LOGIC -->
    <script>
        let bgWorker = null;
        let isWatching = false;

        document.addEventListener("DOMContentLoaded", () => {
            initSystem();
        });

        function initSystem() {
            // Load Beranda Pertama Kali
            fetchData(TARGET_SCRAPE);

            // Logika Auto Refresh sesuai Settingan di atas
            if(AUTO_REFRESH_ACTIVE) {
                document.getElementById('engineStatusIndicator').innerText = "Live Sync Aktif";
                document.getElementById('dotIndicator').className = "w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse";
                
                bgWorker = setInterval(() => {
                    if(!isWatching) fetchData(TARGET_SCRAPE, true);
                }, REFRESH_INTERVAL_MS);
            } else {
                document.getElementById('engineStatusIndicator').innerText = "Sync Dimatikan";
                document.getElementById('dotIndicator').className = "w-1.5 h-1.5 rounded-full bg-rose-500";
            }
        }

        async function fetchData(payload, isSilent = false) {
            if(!isSilent) {
                document.getElementById('loadingState').classList.remove('hidden');
                document.getElementById('dynamicViewport').classList.add('hidden');
            }
            try {
                const res = await fetch(BACKEND_API + encodeURIComponent(payload));
                const json = await res.json();
                
                if(!isSilent) {
                    document.getElementById('loadingState').classList.add('hidden');
                    document.getElementById('dynamicViewport').classList.remove('hidden');
                }
                if(json.status === "SUCCESS") renderUI(json);
            } catch (err) {
                console.error(err);
            }
        }

        function executeSearchAction() {
            const q = document.getElementById('searchQuery').value.trim();
            if(!q) return;
            isWatching = true; // Stop auto-refresh saat mencari
            fetchData(q);
        }

        function requestVideo(url) {
            isWatching = true; // Stop auto-refresh saat nonton
            fetchData(url);
        }

        function renderUI(data) {
            const grid = document.getElementById('contentFeedGrid');
            const titleElement = document.getElementById('titleText');

            if (data.mode === "STREAM_PLAYER") {
                titleElement.innerText = "Pemutar Video";
                const startUrl = data.stream_nodes.length > 0 ? data.stream_nodes[0].url : "";
                
                let html = `
                    <div class="col-span-2 space-y-4">
                        <div class="w-full aspect-video rounded-2xl overflow-hidden bg-black shadow-lg">
                            <iframe id="mainPlayer" src="${startUrl}" class="w-full h-full border-0" allowfullscreen></iframe>
                        </div>
                        <div class="premium-glass p-4 rounded-xl"><h2 class="text-sm font-bold text-white">${data.meta.title}</h2></div>
                        <div class="premium-glass rounded-xl overflow-hidden p-3 space-y-2">
                            <h4 class="text-xs font-bold text-indigo-400 mb-3 border-b border-slate-800 pb-2">PILIH SERVER</h4>
                `;

                data.stream_nodes.forEach((n, i) => {
                    html += `<div onclick="document.getElementById('mainPlayer').src='${n.url}'" class="p-3 bg-[#0b1329] border border-slate-850 rounded-xl flex justify-between cursor-pointer text-xs"><span class="font-bold text-slate-200">${n.type} ${i+1}</span></div>`;
                });

                html += `</div><div class="premium-glass rounded-xl overflow-hidden p-3 grid grid-cols-2 gap-2"><h4 class="col-span-2 text-xs font-bold text-indigo-400 mb-2 border-b border-slate-800 pb-2">DAFTAR EPISODE</h4>`;
                
                data.episode_map.forEach(ep => {
                    html += `<button onclick="requestVideo('${ep.link}')" class="bg-[#0b1329] border border-slate-850 p-2.5 rounded-xl text-left text-xs truncate"><i class="fa-solid fa-play text-[9px] text-indigo-400 mr-1"></i> ${ep.episode_node}</button>`;
                });
                grid.className = "grid grid-cols-1";
                grid.innerHTML = html + "</div></div>";

            } else {
                titleElement.innerText = data.meta.keyword_query.includes('http') ? "Rilis Donghua Terkini" : `Hasil: "${data.meta.keyword_query}"`;
                let html = "";
                data.grid_data.forEach(item => {
                    html += `
                        <div class="premium-glass rounded-2xl overflow-hidden border border-slate-900 flex flex-col justify-end min-h-[220px] p-3 relative group">
                            <img src="${item.image_poster}" class="w-full h-full object-cover absolute inset-0 z-0">
                            <div class="absolute inset-0 bg-gradient-to-t from-[#040712] via-[#040712]/30 to-transparent z-10"></div>
                            <span class="absolute top-2 left-2 bg-indigo-600 text-[9px] font-extrabold px-1.5 py-0.5 rounded z-20 text-white">${item.badge_episode}</span>
                            <div class="relative z-20">
                                <h4 class="text-xs font-bold text-white mb-2.5 line-clamp-2">${item.title}</h4>
                                <button onclick="requestVideo('${item.url_target}')" class="w-full bg-indigo-600 py-2 rounded-xl text-[10px] font-bold text-white">Tonton</button>
                            </div>
                        </div>`;
                });
                grid.className = "grid grid-cols-2 gap-3";
                grid.innerHTML = html;
            }
        }
    </script>
</body>
</html>
