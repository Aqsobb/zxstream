<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQSO STREAM - Portal Donghua Terlengkap</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #040712; 
            color: #f1f5f9; 
            overflow-x: hidden; 
        }
        .premium-glass { 
            background: rgba(11, 17, 34, 0.85); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.02); 
        }
        .card-shadow {
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.5);
        }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #040712; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#040712]">

    <!-- NAVBAR UTAMA -->
    <nav class="premium-glass sticky top-0 z-50 px-4 py-3 border-b border-slate-900/50 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-3" onclick="window.location.reload()" style="cursor: pointer;">
            <div class="w-8 h-8 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i class="fa-solid fa-play text-white text-xs"></i>
            </div>
            <div class="flex flex-col">
                <span class="text-sm font-extrabold tracking-tight text-white">AQSO STREAM</span>
                <span class="text-[9px] font-medium text-indigo-400 tracking-wider">Update Otomatis Real-time</span>
            </div>
        </div>
        
        <!-- USER PROFILE STATUS -->
        <div>
            <button onclick="toggleAuthModal()" class="bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-200 text-[11px] font-semibold px-3 py-2 rounded-xl transition-all flex items-center gap-2">
                <i class="fa-regular fa-user text-xs"></i> <span id="profileBtnText">Masuk Akun</span>
            </button>
        </div>
    </nav>

    <!-- MAIN VIEWPORT -->
    <main class="max-w-md mx-auto p-4 pb-24">

        <!-- KOTAK PENCARIAN -->
        <div class="mb-5">
            <div class="relative flex items-center">
                <i class="fa-solid fa-magnifying-glass absolute left-4 text-slate-400 text-sm"></i>
                <input id="searchQuery" type="text" placeholder="Ketik judul donghua yang kamu cari..." 
                       class="w-full bg-[#0a0f24] border border-slate-850 focus:border-indigo-500 rounded-xl pl-11 pr-20 py-3.5 text-xs font-semibold text-white placeholder-slate-500 outline-none transition-all shadow-inner">
                <button onclick="executeSearchAction()" class="absolute right-2 bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs px-4 py-2 rounded-lg transition-all">
                    Cari
                </button>
            </div>
        </div>

        <!-- RECENT USER DASHBOARD SHORTCUT -->
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div onclick="switchSection('library')" class="premium-glass p-3 rounded-xl border border-slate-900/60 flex items-center gap-3 cursor-pointer hover:border-slate-800 transition-all">
                <div class="w-8 h-8 rounded-lg bg-rose-500/10 flex items-center justify-center text-rose-400 text-sm"><i class="fa-solid fa-bookmark"></i></div>
                <div><h5 class="text-xs font-bold">Daftar Putar</h5><p id="favCountText" class="text-[10px] text-slate-400">0 Judul</p></div>
            </div>
            <div onclick="switchSection('history')" class="premium-glass p-3 rounded-xl border border-slate-900/60 flex items-center gap-3 cursor-pointer hover:border-slate-800 transition-all">
                <div class="w-8 h-8 rounded-lg bg-blue-500/10 flex items-center justify-center text-blue-400 text-sm"><i class="fa-solid fa-history"></i></div>
                <div><h5 class="text-xs font-bold">Riwayat</h5><p id="historyCountText" class="text-[10px] text-slate-400">0 Video</p></div>
            </div>
        </div>

        <!-- AUTOMATIC INITIAL LOADER -->
        <div id="loadingState" class="text-center py-24">
            <div class="w-9 h-9 rounded-full border-4 border-indigo-500/10 border-t-indigo-500 animate-spin inline-block mb-3"></div>
            <p class="text-xs font-semibold text-slate-400 tracking-wide">Memuat rilis donghua terbaru secara otomatis...</p>
        </div>

        <!-- DINAMIS FEED SECTION -->
        <div id="dynamicViewport" class="hidden space-y-6">
            <div>
                <h3 id="feedSectionTitle" class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-fire- flame text-amber-500 text-xs animate-pulse"></i> Baru Saja Diperbarui
                </h3>
                
                <!-- CONTAINER HASIL SCRAPE OTOMATIS -->
                <div id="contentFeedGrid" class="grid grid-cols-2 gap-3">
                    <!-- Data dari API internal anggasi-aip bakal di-inject masuk ke sini langsung -->
                </div>
            </div>
        </div>

    </main>

    <!-- MODAL AUTHENTICATION LAYOUT -->
    <div id="authModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="premium-glass w-full max-w-xs p-5 rounded-2xl border border-slate-800 text-center relative card-shadow">
            <button onclick="toggleAuthModal()" class="absolute top-3 right-4 text-slate-400 text-sm"><i class="fa-solid fa-xmark"></i></button>
            <i class="fa-solid fa-user-circle text-3xl text-indigo-400 mb-2"></i>
            <h3 class="text-sm font-bold mb-1">Masuk ke AQSO STREAM</h3>
            <p class="text-[11px] text-slate-400 mb-4">Simpan riwayat nonton dan daftar putar kamu secara gratis</p>
            <div class="space-y-2 mb-4">
                <input id="authEmail" type="email" placeholder="Alamat Email" class="w-full bg-[#040712] border border-slate-800 rounded-xl p-3 text-xs outline-none text-white focus:border-indigo-500">
                <input id="authPass" type="password" placeholder="Kata Sandi" class="w-full bg-[#040712] border border-slate-800 rounded-xl p-3 text-xs outline-none text-white focus:border-indigo-500">
            </div>
            <button onclick="executeMockLogin()" class="w-full bg-indigo-600 py-2.5 rounded-xl text-xs font-bold text-white shadow-lg">Masuk</button>
        </div>
    </div>

    <!-- OWNER FOOTER MARGIN -->
    <footer class="w-full text-center py-4 border-t border-slate-950 bg-[#02040a] fixed bottom-0 left-0 z-40">
        <p class="text-[10px] font-medium text-slate-500 tracking-wide">© 2026 Powered by <span class="text-slate-400 font-bold">AQSO</span>. All Rights Reserved.</p>
    </footer>

    <!-- ==================== CORE PLATFORM JAVASCRIPT LOGIC ==================== -->
    <script>
        // TARGET HUB FIX: Menggunakan URL Space aktif milik lu biar lancar jaya!
        const API_GATEWAY_URL = "https://anggasi-aip.hf.space/api/predict";
        
        // DEFAULT AUTOMATIC TARGET: Begitu web dibuka, link beranda ini langsung di-scrape otomatis
        const DEFAULT_HOMEPAGE_SCRAPE = "https://anichin.moe/";

        let appState = {
            user: JSON.parse(localStorage.getItem('aqso_user')) || null,
            favorites: JSON.parse(localStorage.getItem('aqso_favorites')) || [],
            history: JSON.parse(localStorage.getItem('aqso_history')) || [],
            activeStreamNodes: [],
            currentTitle: ""
        };

        // LOOP TRIGGER OTOMATIS SAAT PERTAMA KALI WEB DI-LOAD
        document.addEventListener("DOMContentLoaded", () => {
            updateDashboardCounters();
            if (appState.user) {
                document.getElementById('profileBtnText').innerText = appState.user.email.split("@")[0];
            }
            
            // 🔥 ENGINE ACTION: Otomatis jalankan scrape beranda tanpa nunggu klik user!
            fetchOmniScraperEngine(DEFAULT_HOMEPAGE_SCRAPE);
        });

        function updateDashboardCounters() {
            const favText = document.getElementById('favCountText');
            const histText = document.getElementById('historyCountText');
            if (favText) favText.innerText = `${appState.favorites.length} Judul`;
            if (histText) histText.innerText = `${appState.history.length} Video`;
        }

        function toggleAuthModal() {
            document.getElementById('authModal').classList.toggle('hidden');
        }

        function executeMockLogin() {
            const email = document.getElementById('authEmail').value.trim();
            const pass = document.getElementById('authPass').value.trim();
            if(!email || !pass) return alert("Harap isi email dan password!");

            appState.user = { email: email, uid: "usr_" + Date.now() };
            localStorage.setItem('aqso_user', JSON.stringify(appState.user));
            document.getElementById('profileBtnText').innerText = email.split("@")[0];
            toggleAuthModal();
            alert(`Selamat datang, ${email.split("@")[0]}!`);
        }

        function saveWatchHistory(title, url) {
            appState.history = appState.history.filter(item => item.url !== url);
            appState.history.unshift({ title: title, url: url, timestamp: new Date().toLocaleDateString() });
            if (appState.history.length > 20) appState.history.pop();
            localStorage.setItem('aqso_history', JSON.stringify(appState.history));
            updateDashboardCounters();
        }

        function toggleFavoriteAnime() {
            if (!appState.currentTitle) return;
            const index = appState.favorites.findIndex(item => item.title === appState.currentTitle);
            
            if (index > -1) {
                appState.favorites.splice(index, 1);
                alert("Dihapus dari Daftar Putar.");
            } else {
                appState.favorites.push({ title: appState.currentTitle, dateAdded: new Date().toLocaleDateString() });
                alert("Ditambahkan ke Daftar Putar.");
            }
            localStorage.setItem('aqso_favorites', JSON.stringify(appState.favorites));
            updateDashboardCounters();
            
            const favIcon = document.getElementById('favIconIndicator');
            if (favIcon) favIcon.className = index > -1 ? "fa-regular fa-bookmark text-base" : "fa-solid fa-bookmark text-base text-indigo-400";
        }

        // ASYNC CORE PIPELINE FETCH
        async function fetchOmniScraperEngine(payload) {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('dynamicViewport').classList.add('hidden');

            try {
                const response = await fetch(API_GATEWAY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [payload], fn_index: 0 })
                });

                const json = await response.json();
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('dynamicViewport').classList.remove('hidden');

                if (json.data && json.data[1]) {
                    const parsedData = JSON.parse(json.data[1]);
                    renderProfessionalViewport(parsedData);
                } else {
                    alert("Koneksi gagal merespons. Silakan muat ulang halaman ini.");
                }
            } catch (err) {
                console.error(err);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('dynamicViewport').classList.remove('hidden');
                alert("Gagal terhubung ke engine streaming. Pastikan backend di https://anggasi-aip.hf.space/ berstatus RUNNING.");
            }
        }

        function executeSearchAction() {
            const query = document.getElementById('searchQuery').value.trim();
            if (!query) return alert("Masukkan kata kunci pencarian!");
            fetchOmniScraperEngine(query);
        }

        function requestStreamBypass(url) {
            fetchOmniScraperEngine(url);
        }

        // COMPILER INTERFACE ENGINE
        function renderProfessionalViewport(data) {
            const grid = document.getElementById('contentFeedGrid');
            const sectionTitle = document.getElementById('feedSectionTitle');

            if (data.mode === "STREAM_PLAYER") {
                appState.activeStreamNodes = data.stream_nodes;
                appState.currentTitle = data.meta.title;
                saveWatchHistory(data.meta.title, data.meta.source_url);

                sectionTitle.innerHTML = `<i class="fa-solid fa-circle-play text-indigo-500 mr-1.5"></i> Pemutar Video`;
                
                const initialUrl = data.stream_nodes.length > 0 ? data.stream_nodes[0].url : "#";
                const isFavorited = appState.favorites.some(item => item.title === data.meta.title);

                let watchLayoutHtml = `
                    <div class="col-span-2 space-y-4">
                        <div class="w-full aspect-video rounded-2xl overflow-hidden bg-black relative shadow-lg">
                            <iframe id="mainVideoPlayerFrame" src="${initialUrl}" class="w-full h-full border-0 absolute inset-0" allowfullscreen="true" scrolling="no"></iframe>
                        </div>

                        <div class="premium-glass p-4 rounded-xl flex justify-between items-start gap-4">
                            <div>
                                <h2 class="text-sm font-bold text-white leading-tight">${data.meta.title}</h2>
                                <p class="text-[10px] text-slate-500 mt-1">Multi-Server Cloud System</p>
                            </div>
                            <button onclick="toggleFavoriteAnime()" class="p-2.5 bg-slate-900 border border-slate-800 rounded-xl hover:border-indigo-500 transition-colors">
                                <i id="favIconIndicator" class="${isFavorited ? 'fa-solid fa-bookmark text-indigo-400' : 'fa-regular fa-bookmark'} text-base"></i>
                            </button>
                        </div>

                        <div class="premium-glass rounded-xl overflow-hidden">
                            <div class="flex border-b border-slate-900 text-center text-xs font-bold">
                                <div onclick="switchPlayerTab('servers')" id="tabBtn-servers" class="flex-1 py-3 text-indigo-400 border-b-2 border-indigo-500 bg-slate-900/20 cursor-pointer">PILIH SERVER</div>
                                <div onclick="switchPlayerTab('episodes')" id="tabBtn-episodes" class="flex-1 py-3 text-slate-400 cursor-pointer">DAFTAR EPISODE</div>
                            </div>

                            <div id="panel-servers" class="p-3 space-y-2">
                `;

                if (data.stream_nodes.length > 0) {
                    data.stream_nodes.forEach((node, i) => {
                        watchLayoutHtml += `
                            <div onclick="switchVideoServerSource('${node.url}', ${i})" id="serverNodeCard-${i}" class="p-3 rounded-xl border ${i === 0 ? 'border-indigo-500/50 bg-indigo-500/5' : 'border-slate-850 bg-[#0b1329]'} flex justify-between items-center text-xs cursor-pointer hover:border-indigo-500/30 transition-all">
                                <div class="flex items-center gap-2">
                                    <i class="fa-solid fa-server ${i === 0 ? 'text-indigo-400' : 'text-slate-400'} text-[11px]"></i>
                                    <span class="font-semibold text-slate-200">Server Utama ${i + 1}</span>
                                </div>
                                <span class="text-[10px] font-bold text-slate-400">HD Player</span>
                            </div>
                        `;
                    });
                } else {
                    watchLayoutHtml += `<p class="text-xs text-red-400 p-2 italic text-center">Video tidak dapat dimuat langsung oleh server asal.</p>`;
                }

                watchLayoutHtml += `</div>
                            <div id="panel-episodes" class="p-3 hidden grid grid-cols-2 gap-2">
                `;

                if (data.episode_map.length > 0) {
                    data.episode_map.forEach(ep => {
                        watchLayoutHtml += `
                            <button onclick="requestStreamBypass('${ep.link}')" class="bg-[#0b1329] hover:bg-indigo-950/20 border border-slate-850 hover:border-indigo-500/40 p-2.5 rounded-xl text-left text-xs text-slate-300 transition-all truncate">
                                <i class="fa-solid fa-circle-play text-[10px] text-indigo-400 mr-1.5"></i> ${ep.episode_node}
                            </button>
                        `;
                    });
                } else {
                    watchLayoutHtml += `<p class="text-xs text-slate-500 col-span-2 p-2 italic text-center">Tidak ada episode tambahan.</p>`;
                }

                watchLayoutHtml += `</div></div></div>`;
                grid.className = "grid grid-cols-1";
                grid.innerHTML = watchLayoutHtml;

            } else if (data.mode === "SEARCH_GRID") {
                // Mengecek apakah input data adalah hasil auto-load homepage awal atau hasil search input user
                if(data.meta.keyword_query && !data.meta.keyword_query.includes("https://")) {
                    sectionTitle.innerHTML = `<i class="fa-solid fa-magnifying-glass text-indigo-400 mr-1.5"></i> Hasil Pencarian: "${data.meta.keyword_query}"`;
                } else {
                    sectionTitle.innerHTML = `<i class="fa-solid fa-star text-amber-500 text-xs animate-pulse mr-1.5"></i> Episode Donghua Terbaru`;
                }
                
                let gridHtml = "";
                if (data.grid_data && data.grid_data.length > 0) {
                    data.grid_data.forEach(item => {
                        gridHtml += `
                            <div class="premium-glass rounded-2xl overflow-hidden border border-slate-900 flex flex-col justify-end min-h-[220px] p-3 relative group shadow-md">
                                <img src="${item.image_poster}" class="w-full h-full object-cover absolute inset-0 z-0 group-hover:scale-105 transition-transform duration-300" onerror="this.src='https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=400';">
                                <div class="absolute inset-0 bg-gradient-to-t from-[#040712] via-[#040712]/30 to-transparent z-10"></div>
                                <span class="absolute top-2 left-2 bg-indigo-600 text-[9px] font-extrabold px-1.5 py-0.5 rounded z-20 text-white shadow">${item.badge_episode}</span>
                                
                                <div class="relative z-20">
                                    <h4 class="text-xs font-bold text-white leading-tight mb-2.5 line-clamp-2">${item.title}</h4>
                                    <button onclick="requestStreamBypass('${item.url_target}')" class="w-full text-center bg-indigo-600 hover:bg-indigo-500 py-2 rounded-xl text-[10px] font-bold text-white transition-all shadow-md">
                                        Tonton Sekarang
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    gridHtml = `<div class="col-span-2 text-center py-14 text-xs text-slate-500 italic">Donghua tidak ditemukan. Silakan gunakan kata kunci lain.</div>`;
                }
                grid.className = "grid grid-cols-2 gap-3";
                grid.innerHTML = gridHtml;
            }
        }

        function switchVideoServerSource(serverUrl, index) {
            document.getElementById('mainVideoPlayerFrame').src = serverUrl;
            appState.activeStreamNodes.forEach((_, i) => {
                const card = document.getElementById(`serverNodeCard-${i}`);
                if(card) {
                    card.className = i === index ? 
                        "p-3 rounded-xl border border-indigo-500/50 bg-indigo-500/5 flex justify-between items-center text-xs cursor-pointer transition-all" : 
                        "p-3 rounded-xl border border-slate-850 bg-[#0b1329] flex justify-between items-center text-xs cursor-pointer hover:border-indigo-500/30 transition-all";
                }
            });
        }

        function switchPlayerTab(tabName) {
            const serversBtn = document.getElementById('tabBtn-servers');
            const episodesBtn = document.getElementById('tabBtn-episodes');
            const serversPanel = document.getElementById('panel-servers');
            const episodesPanel = document.getElementById('panel-episodes');

            if (tabName === 'servers') {
                serversBtn.className = "flex-1 py-3 text-indigo-400 border-b-2 border-indigo-500 bg-slate-900/20 cursor-pointer";
                episodesBtn.className = "flex-1 py-3 text-slate-400 cursor-pointer";
                serversPanel.classList.remove('hidden');
                episodesPanel.classList.add('hidden');
            } else {
                episodesBtn.className = "flex-1 py-3 text-indigo-400 border-b-2 border-indigo-500 bg-slate-900/20 cursor-pointer";
                serversBtn.className = "flex-1 py-3 text-slate-400 cursor-pointer";
                episodesPanel.classList.remove('hidden');
                serversPanel.classList.add('hidden');
            }
        }

        function switchSection(section) {
            const grid = document.getElementById('contentFeedGrid');
            const sectionTitle = document.getElementById('feedSectionTitle');

            if (section === 'library') {
                sectionTitle.innerHTML = `<i class="fa-solid fa-bookmark text-indigo-400 mr-1.5"></i> Daftar Putar Saya`;
                if(appState.favorites.length === 0) {
                    grid.innerHTML = `<p class="col-span-2 text-center text-xs text-slate-500 py-10 italic">Belum ada judul tersimpan.</p>`;
                    return;
                }
                let html = "";
                appState.favorites.forEach(item => {
                    html += `
                        <div class="premium-glass p-3 rounded-xl border border-slate-900 text-left flex justify-between items-center col-span-2">
                            <div><h4 class="text-xs font-bold text-white">${item.title}</h4><p class="text-[10px] text-slate-500">Ditambahkan: ${item.dateAdded}</p></div>
                            <button onclick="executeSearchActionWithKeyword('${item.title}')" class="bg-indigo-600 text-white text-[10px] font-bold px-3 py-1.5 rounded-lg">Buka</button>
                        </div>
                    `;
                });
                grid.className = "grid grid-cols-1 gap-2";
                grid.innerHTML = html;
            } else if (section === 'history') {
                sectionTitle.innerHTML = `<i class="fa-solid fa-history text-indigo-400 mr-1.5"></i> Riwayat Nonton Terakhir`;
                if(appState.history.length === 0) {
                    grid.innerHTML = `<p class="col-span-2 text-center text-xs text-slate-500 py-10 italic">Belum ada riwayat video.</p>`;
                    return;
                }
                let html = "";
                appState.history.forEach(item => {
                    html += `
                        <div class="premium-glass p-3 rounded-xl border border-slate-900 text-left flex justify-between items-center col-span-2">
                            <div class="truncate max-w-[240px]"><h4 class="text-xs font-bold text-white truncate">${item.title}</h4><p class="text-[10px] text-slate-500">Tanggal nonton: ${item.timestamp}</p></div>
                            <button onclick="requestStreamBypass('${item.url}')" class="bg-indigo-600 text-white text-[10px] font-bold px-3 py-1.5 rounded-lg">Putar</button>
                        </div>
                    `;
                });
                grid.className = "grid grid-cols-1 gap-2";
                grid.innerHTML = html;
            }
        }

        function executeSearchActionWithKeyword(keyword) {
            document.getElementById('searchQuery').value = keyword;
            fetchOmniScraperEngine(keyword);
        }
    </script>
</body>
</html>
