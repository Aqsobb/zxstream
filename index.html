<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQSO STREAM - Portal Donghua VIP</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #030614; 
            color: #f1f5f9; 
            overflow-x: hidden; 
        }
        .premium-glass { 
            background: rgba(13, 19, 41, 0.85); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.04); 
        }
        .card-hover:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
        }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #030614; }
        ::-webkit-scrollbar-thumb { background: #312e81; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#030614] selection:bg-indigo-500 selection:text-white">

    <nav class="premium-glass sticky top-0 z-50 px-4 py-3.5 border-b border-indigo-900/40 flex justify-between items-center shadow-[0_4px_30px_rgba(0,0,0,0.5)]">
        <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.reload()">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <i class="fa-solid fa-play text-white text-sm"></i>
            </div>
            <div class="flex flex-col">
                <span class="text-[15px] font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-300">AQSO STREAM</span>
                <div class="flex items-center gap-1.5 mt-0.5">
                    <span id="dotIndicator" class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_#10b981]"></span>
                    <span id="engineStatusIndicator" class="text-[9px] font-bold text-emerald-400 tracking-wider uppercase">Live Connection</span>
                </div>
            </div>
        </div>
        <div>
            <button onclick="alert('Fitur Profil Sedang Dalam Pengembangan!')" class="bg-[#0a0f24] hover:bg-indigo-600 border border-slate-800 hover:border-indigo-500 text-slate-200 text-[11px] font-bold px-3.5 py-2 rounded-xl flex items-center gap-2 transition-all shadow-md">
                <i class="fa-regular fa-user text-xs"></i> <span>Masuk</span>
            </button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 pb-28 min-h-screen">

        <div class="mb-6 relative z-30">
            <div class="relative flex items-center shadow-xl">
                <i class="fa-solid fa-magnifying-glass absolute left-4 text-indigo-400 text-sm"></i>
                <input id="searchQuery" type="text" placeholder="Ketik judul donghua favoritmu..." 
                       class="w-full bg-[#0a0f24] border border-slate-800 focus:border-indigo-500 rounded-xl pl-11 pr-24 py-4 text-[13px] font-semibold text-white placeholder-slate-500 outline-none transition-all shadow-inner"
                       onkeypress="if(event.key === 'Enter') executeSearchAction()">
                <button onclick="executeSearchAction()" class="absolute right-2 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold text-xs px-5 py-2.5 rounded-lg transition-all shadow-lg">
                    Cari
                </button>
            </div>
        </div>

        <div id="loadingState" class="text-center py-28">
            <div class="relative inline-flex items-center justify-center">
                <div class="w-12 h-12 rounded-full border-4 border-slate-800 border-t-indigo-500 animate-spin absolute"></div>
                <i class="fa-solid fa-bolt text-indigo-500 text-sm animate-pulse"></i>
            </div>
            <p class="text-xs font-bold text-slate-400 tracking-widest uppercase mt-6 animate-pulse">Sinkronisasi Target...</p>
        </div>

        <div id="dynamicViewport" class="hidden space-y-6 animate-fadeIn">
            <div>
                <h3 class="text-[13px] font-black uppercase tracking-wider text-slate-200 mb-4 flex items-center gap-2 border-b border-slate-800/60 pb-2">
                    <i id="feedIcon" class="fa-solid fa-fire text-amber-500 text-sm"></i> <span id="titleText">Rilis Donghua Terbaru</span>
                </h3>
                <div id="contentFeedGrid" class="grid grid-cols-2 gap-3.5">
                    </div>
            </div>
        </div>

    </main>

    <footer class="w-full text-center py-4 border-t border-slate-900/80 bg-[#02040a] fixed bottom-0 left-0 z-40 shadow-[0_-5px_20px_rgba(0,0,0,0.5)]">
        <p class="text-[10px] font-bold text-slate-500 tracking-widest">© 2026 CRAFTED BY <span class="text-indigo-400 drop-shadow-[0_0_5px_rgba(99,102,241,0.5)]">AQSO</span></p>
    </footer>

    <script>
        // LINK API HUGGING FACE LU (Selesai, Fix 100%)
        const BACKEND_API = "https://anggasi-aip.hf.space/api/scrape";

        // TARGET AWAL BERANDA 
        const TARGET_SCRAPE = "https://anichin.moe/"; 

        // AUTO SYNC BACKGROUND (Biar web selalu update)
        const AUTO_REFRESH_ACTIVE = true; 
        const REFRESH_INTERVAL_MS = 60000; // Tiap 60 detik tarik data baru biar awet
    </script>
    <script>
        let isWatching = false; // Mencegah web kereload otomatis pas user lagi asik nonton

        document.addEventListener("DOMContentLoaded", () => {
            initSystem();
        });

        function initSystem() {
            // Langsung tembak API saat web dibuka
            fetchData(TARGET_SCRAPE);

            // Jalankan siklus sinkronisasi jika aktif
            if(AUTO_REFRESH_ACTIVE) {
                setInterval(() => {
                    // Kalau lagi nonton atau habis nyari, jangan di-refresh!
                    if(!isWatching) {
                        fetchData(TARGET_SCRAPE, true);
                    }
                }, REFRESH_INTERVAL_MS);
            }
        }

        // FUNGSI UTAMA PENARIK DATA DARI FASTAPI / GRADIO
        async function fetchData(payload, isSilent = false) {
            if(!isSilent) {
                document.getElementById('loadingState').classList.remove('hidden');
                document.getElementById('dynamicViewport').classList.add('hidden');
            }
            
            try {
                // Post payload ke Gradio API
                const response = await fetch(BACKEND_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [payload] })
                });
                
                const jsonResult = await response.json();
                
                if(!isSilent) {
                    document.getElementById('loadingState').classList.add('hidden');
                    document.getElementById('dynamicViewport').classList.remove('hidden');
                }

                // Bongkar hasil Gradio API
                if (jsonResult && jsonResult.data && jsonResult.data[0]) {
                    const coreData = jsonResult.data[0];
                    if (coreData.status === "SUCCESS") {
                        renderUI(coreData);
                    } else {
                        alert("⚠️ Target Error: " + coreData.message);
                    }
                } else {
                    alert("⚠️ Server tidak mengembalikan data yang valid.");
                }
            } catch (err) {
                console.error(err);
                if(!isSilent) {
                    document.getElementById('loadingState').classList.add('hidden');
                    document.getElementById('dynamicViewport').classList.remove('hidden');
                    alert("❌ Koneksi Gagal! Pastikan Hugging Face Space 'anggasi-aip' berstatus RUNNING.");
                }
            }
        }

        function executeSearchAction() {
            const q = document.getElementById('searchQuery').value.trim();
            if(!q) return;
            isWatching = true; // Kunci sistem auto-refresh
            fetchData(q);
        }

        function requestVideo(url) {
            isWatching = true; // Kunci sistem auto-refresh
            window.scrollTo({ top: 0, behavior: 'smooth' });
            fetchData(url);
        }

        function switchVideoServer(url) {
            document.getElementById('mainPlayerFrame').src = url;
        }

        // MESIN RENDER UI HTML
        function renderUI(data) {
            const grid = document.getElementById('contentFeedGrid');
            const titleText = document.getElementById('titleText');
            const feedIcon = document.getElementById('feedIcon');

            if (data.mode === "STREAM_PLAYER") {
                // =============== TAMPILAN PEMUTAR VIDEO ===============
                titleText.innerText = "Ruang Putar Video";
                feedIcon.className = "fa-solid fa-desktop text-indigo-500 text-sm";
                
                const startUrl = data.stream_nodes.length > 0 ? data.stream_nodes[0].url : "";
                
                let html = `
                    <div class="col-span-2 space-y-5">
                        
                        <div class="w-full aspect-video rounded-2xl overflow-hidden bg-black shadow-[0_10px_40px_-10px_rgba(79,70,229,0.4)] relative border border-slate-800">
                            <iframe id="mainPlayerFrame" src="${startUrl}" class="w-full h-full border-0 absolute inset-0" allowfullscreen="true" scrolling="no"></iframe>
                        </div>
                        
                        <div class="premium-glass p-5 rounded-2xl">
                            <h2 class="text-[15px] font-bold text-white leading-snug">${data.meta.title}</h2>
                            <button onclick="isWatching=false; fetchData(TARGET_SCRAPE);" class="mt-4 bg-slate-900 hover:bg-indigo-600 border border-slate-800 hover:border-indigo-500 text-[11px] font-bold text-white px-4 py-2.5 rounded-xl transition-all shadow-md">
                                <i class="fa-solid fa-house mr-1.5"></i> Kembali ke Beranda
                            </button>
                        </div>
                        
                        <div class="premium-glass rounded-2xl overflow-hidden p-4 space-y-2">
                            <h4 class="text-xs font-black text-indigo-400 mb-4 border-b border-slate-800/70 pb-2"><i class="fa-solid fa-tower-broadcast mr-1.5"></i> PILIH SERVER KONEKSI</h4>
                `;

                if (data.stream_nodes.length > 0) {
                    data.stream_nodes.forEach((n, i) => {
                        html += `
                            <div onclick="switchVideoServer('${n.url}')" class="p-3.5 bg-[#0a0f24] hover:bg-[#121b3a] border border-slate-800 rounded-xl flex justify-between items-center cursor-pointer text-xs transition-all shadow-sm">
                                <span class="font-bold text-slate-200">${n.type} ${i+1}</span>
                                <span class="text-[9px] font-black text-slate-300 bg-indigo-600 px-2.5 py-1 rounded-md uppercase tracking-wider shadow">Pilih</span>
                            </div>`;
                    });
                } else {
                    html += `<p class="text-xs text-rose-400 italic text-center py-3 bg-rose-500/10 rounded-lg">Source video terenkripsi atau link rusak.</p>`;
                }

                // Daftar Episode Map
                html += `
                        </div>
                        <div class="premium-glass rounded-2xl overflow-hidden p-4">
                            <h4 class="text-xs font-black text-indigo-400 mb-4 border-b border-slate-800/70 pb-2"><i class="fa-solid fa-layer-group mr-1.5"></i> DAFTAR EPISODE</h4>
                            <div class="grid grid-cols-2 gap-2.5">
                `;
                
                if (data.episode_map.length > 0) {
                    data.episode_map.forEach(ep => {
                        html += `
                            <button onclick="requestVideo('${ep.link}')" class="bg-[#0a0f24] hover:bg-indigo-600 border border-slate-800 hover:border-indigo-500 p-3 rounded-xl text-left text-[11px] font-bold truncate text-slate-300 hover:text-white transition-all shadow-sm">
                                <i class="fa-solid fa-play text-[9px] text-emerald-400 mr-1.5"></i> ${ep.episode_node}
                            </button>`;
                    });
                } else {
                    html += `<p class="text-xs text-slate-500 italic col-span-2 text-center py-3 bg-slate-900/50 rounded-lg">Episode tunggal / tidak ada list navigasi.</p>`;
                }
                
                html += `</div></div></div>`;
                grid.className = "grid grid-cols-1";
                grid.innerHTML = html;

            } else {
                // =============== TAMPILAN BERANDA GRID ===============
                titleText.innerText = data.meta.keyword_query.includes('http') ? "Rilis Donghua Terbaru" : `Hasil Pencarian: "${data.meta.keyword_query}"`;
                feedIcon.className = data.meta.keyword_query.includes('http') ? "fa-solid fa-fire text-amber-500 text-sm animate-pulse" : "fa-solid fa-magnifying-glass text-indigo-400 text-sm";
                
                let html = "";
                if (data.grid_data.length > 0) {
                    data.grid_data.forEach(item => {
                        html += `
                            <div class="premium-glass rounded-2xl overflow-hidden border border-slate-800/80 flex flex-col justify-end min-h-[240px] p-3 relative group card-hover cursor-pointer transition-all duration-300" onclick="requestVideo('${item.url_target}')">
                                <img src="${item.image_poster}" class="w-full h-full object-cover absolute inset-0 z-0 group-hover:scale-110 transition-transform duration-700" onerror="this.src='https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=400';">
                                <div class="absolute inset-0 bg-gradient-to-t from-[#030614] via-[#030614]/50 to-transparent z-10"></div>
                                
                                <span class="absolute top-2.5 left-2.5 bg-indigo-600 text-[10px] font-black px-2 py-0.5 rounded-md z-20 text-white shadow-lg shadow-indigo-600/30">${item.badge_episode}</span>
                                
                                <div class="relative z-20">
                                    <h4 class="text-[12px] font-bold text-white mb-2.5 line-clamp-2 drop-shadow-md leading-tight">${item.title}</h4>
                                    <button class="w-full bg-slate-100/10 backdrop-blur-md border border-white/10 hover:bg-indigo-600 hover:border-indigo-500 py-2.5 rounded-xl text-[10px] font-bold text-white transition-all">Tonton Video</button>
                                </div>
                            </div>`;
                    });
                } else {
                    html += `<div class="col-span-2 text-center py-16 bg-slate-900/40 rounded-2xl border border-slate-800"><p class="text-[13px] font-bold text-slate-500">Donghua tidak ditemukan.</p></div>`;
                }
                
                grid.className = "grid grid-cols-2 gap-3.5";
                grid.innerHTML = html;
            }
        }
    </script>
</body>
</html>
