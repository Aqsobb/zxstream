<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQSO STREAM - Portal Donghua Premium</title>
    
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #040712; 
            color: #f1f5f9; 
            overflow-x: hidden; 
        }
        .premium-glass { 
            background: rgba(11, 17, 34, 0.85); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #040712; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#040712]">

    <!-- NAVBAR USER -->
    <nav class="premium-glass sticky top-0 z-50 px-4 py-3 border-b border-slate-900/50 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-3" onclick="window.location.reload()" style="cursor: pointer;">
            <div class="w-8 h-8 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i class="fa-solid fa-play text-white text-xs"></i>
            </div>
            <div class="flex flex-col">
                <span class="text-sm font-extrabold tracking-tight text-white">AQSO STREAM</span>
                <div class="flex items-center gap-1.5">
                    <span id="dotIndicator" class="w-1.5 h-1.5 rounded-full bg-slate-500"></span>
                    <span id="engineStatusIndicator" class="text-[9px] font-medium text-slate-400 tracking-wider">Menunggu Sistem...</span>
                </div>
            </div>
        </div>
        <div>
            <button onclick="alert('Fitur Login Akun Segera Hadir!')" class="bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-200 text-[11px] font-semibold px-3 py-2 rounded-xl flex items-center gap-2 transition-all">
                <i class="fa-regular fa-user text-xs"></i> Masuk
            </button>
        </div>
    </nav>

    <!-- CORE VIEWPORT CONTENT -->
    <main class="max-w-md mx-auto p-4 pb-24">

        <!-- FITUR PENCARIAN -->
        <div class="mb-6">
            <div class="relative flex items-center shadow-lg">
                <i class="fa-solid fa-magnifying-glass absolute left-4 text-slate-400 text-sm"></i>
                <input id="searchQuery" type="text" placeholder="Cari donghua kesukaanmu..." 
                       class="w-full bg-[#0a0f24] border border-slate-850 focus:border-indigo-500 rounded-xl pl-11 pr-20 py-3.5 text-xs font-semibold text-white placeholder-slate-500 outline-none transition-all shadow-inner"
                       onkeypress="if(event.key === 'Enter') executeSearchAction()">
                <button onclick="executeSearchAction()" class="absolute right-2 bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs px-4 py-2 rounded-lg transition-all">
                    Cari
                </button>
            </div>
        </div>

        <!-- LOADING INDICATOR -->
        <div id="loadingState" class="text-center py-24">
            <div class="w-9 h-9 rounded-full border-4 border-indigo-500/20 border-t-indigo-500 animate-spin inline-block mb-3"></div>
            <p class="text-xs font-semibold text-slate-400 tracking-wide animate-pulse">Menghubungkan ke Server AQSO...</p>
        </div>

        <!-- DYNAMIC CONTENT (BERANDA / PEMUTAR VIDEO) -->
        <div id="dynamicViewport" class="hidden space-y-6">
            <div>
                <h3 id="feedSectionTitle" class="text-xs font-bold uppercase tracking-wider text-slate-300 mb-4 flex items-center gap-2">
                    <i id="feedIcon" class="fa-solid fa-bolt text-amber-500 text-xs"></i> <span id="titleText">Rilis Donghua Terkini</span>
                </h3>
                <div id="contentFeedGrid" class="grid grid-cols-2 gap-3">
                    <!-- Data injeksi otomatis masuk ke sini -->
                </div>
            </div>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="w-full text-center py-4 border-t border-slate-950 bg-[#02040a] fixed bottom-0 left-0 z-40">
        <p class="text-[10px] font-medium text-slate-500 tracking-wide">© 2026 Powered by <span class="text-indigo-400 font-bold">AQSO STREAM ENGINE</span></p>
    </footer>

    <!-- ========================================================== -->
    <!-- 🔥 SEKTOR PENGATURAN GLOBAL SISTEM (UBAH DI SINI AJA) 🔥 -->
    <!-- ========================================================== -->
    <script>
        // 1. LINK API HUGGING FACE LU (Pastikan space Hugging Face statusnya 'Running')
        const BACKEND_API = "https://anggasi-aip.hf.space/api/scrape";

        // 2. DOMAIN TARGET SCRAPING UTAMA LU (Default: Beranda Anichin)
        const TARGET_SCRAPE = "https://anichin.moe/"; 

        // 3. PENGATURAN AUTO-REFRESH SINKRONISASI (Menarik data baru otomatis)
        const AUTO_REFRESH_ACTIVE = true; // Ganti 'false' jika mau dimatikan
        const REFRESH_INTERVAL_MS = 30000; // Auto-update setiap 30 detik (30000 ms)
    </script>
    <!-- ========================================================== -->

    <!-- ENGINE LOGIC UTAMA JAVASCRIPT -->
    <script>
        let bgWorker = null;
        let isWatching = false; // Flag supaya beranda gak ke-refresh pas lagi nonton video atau nyari

        document.addEventListener("DOMContentLoaded", () => {
            initSystem();
        });

        function initSystem() {
            // Load Beranda Pertama Kali
            fetchData(TARGET_SCRAPE);

            // Logika Auto Refresh Auto-Sync
            if(AUTO_REFRESH_ACTIVE) {
                document.getElementById('engineStatusIndicator').innerText = "Live Sync Aktif";
                document.getElementById('engineStatusIndicator').classList.add('text-emerald-400');
                document.getElementById('dotIndicator').className = "w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse";
                
                bgWorker = setInterval(() => {
                    // Hanya otomatis refresh jika user ada di beranda (bukan di dalam player / hasil pencarian)
                    if(!isWatching) fetchData(TARGET_SCRAPE, true);
                }, REFRESH_INTERVAL_MS);
            } else {
                document.getElementById('engineStatusIndicator').innerText = "Mode Statis";
                document.getElementById('dotIndicator').className = "w-1.5 h-1.5 rounded-full bg-amber-500";
            }
        }

        // FUNGSI TARIK DATA DARI BACKEND HUGGING FACE VIA GRADIO POST API
        async function fetchData(payload, isSilent = false) {
            if(!isSilent) {
                document.getElementById('loadingState').classList.remove('hidden');
                document.getElementById('dynamicViewport').classList.add('hidden');
            }
            
            try {
                const response = await fetch(BACKEND_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [payload] })
                });
                
                const jsonResult = await response.json();
                
                if(!isSilent) {
                    document.getElementById('loadingState').classList.add('hidden');
                    document.getElementById('dynamicViewport').classList.remove('hidden');
                }

                // Ekstrak data dari format Gradio array
                if (jsonResult && jsonResult.data && jsonResult.data[0]) {
                    const coreData = jsonResult.data[0];
                    if (coreData.status === "SUCCESS") {
                        renderUI(coreData);
                    } else {
                        alert("Gagal memuat konten: " + coreData.message);
                    }
                } else {
                    alert("Respons server tidak dikenali.");
                }
            } catch (err) {
                console.error(err);
                if(!isSilent) {
                    document.getElementById('loadingState').classList.add('hidden');
                    document.getElementById('dynamicViewport').classList.remove('hidden');
                    alert("Koneksi Error. Pastikan server Space Hugging Face berstatus RUNNING dan bebas dari error.");
                }
            }
        }

        function executeSearchAction() {
            const q = document.getElementById('searchQuery').value.trim();
            if(!q) return;
            isWatching = true; // Stop auto-refresh saat mencari
            fetchData(q);
        }

        function requestVideo(url) {
            isWatching = true; // Stop auto-refresh saat nonton
            window.scrollTo({ top: 0, behavior: 'smooth' });
            fetchData(url);
        }

        function switchVideoServer(url) {
            document.getElementById('mainPlayerFrame').src = url;
        }

        // FUNGSI KOMPILER UNTUK MENGUBAH JSON MENJADI TAMPILAN HTML
        function renderUI(data) {
            const grid = document.getElementById('contentFeedGrid');
            const titleText = document.getElementById('titleText');
            const feedIcon = document.getElementById('feedIcon');

            if (data.mode === "STREAM_PLAYER") {
                // TAMPILAN PEMUTAR VIDEO
                titleText.innerText = "Pemutar Video";
                feedIcon.className = "fa-solid fa-circle-play text-indigo-500 text-xs";
                
                const startUrl = data.stream_nodes.length > 0 ? data.stream_nodes[0].url : "";
                
                let html = `
                    <div class="col-span-2 space-y-4">
                        <!-- Kotak Iframe Player -->
                        <div class="w-full aspect-video rounded-2xl overflow-hidden bg-black shadow-[0_10px_30px_-10px_rgba(99,102,241,0.3)] relative">
                            <iframe id="mainPlayerFrame" src="${startUrl}" class="w-full h-full border-0 absolute inset-0" allowfullscreen="true" scrolling="no"></iframe>
                        </div>
                        
                        <!-- Judul -->
                        <div class="premium-glass p-4 rounded-xl">
                            <h2 class="text-sm font-bold text-white leading-tight">${data.meta.title}</h2>
                            <button onclick="isWatching=false; fetchData(TARGET_SCRAPE);" class="mt-3 bg-slate-800 hover:bg-slate-700 text-[10px] text-white px-3 py-1.5 rounded-lg transition-all"><i class="fa-solid fa-arrow-left mr-1"></i> Kembali ke Beranda</button>
                        </div>
                        
                        <!-- Server Pilihan -->
                        <div class="premium-glass rounded-xl overflow-hidden p-3 space-y-2">
                            <h4 class="text-xs font-bold text-indigo-400 mb-3 border-b border-slate-800 pb-2"><i class="fa-solid fa-server mr-1"></i> PILIH SERVER VIDEO</h4>
                `;

                if (data.stream_nodes.length > 0) {
                    data.stream_nodes.forEach((n, i) => {
                        html += `
                            <div onclick="switchVideoServer('${n.url}')" class="p-3 bg-[#0b1329] hover:bg-[#121f42] border border-slate-850 rounded-xl flex justify-between items-center cursor-pointer text-xs transition-all">
                                <span class="font-bold text-slate-200">${n.type} ${i+1}</span>
                                <span class="text-[9px] text-slate-500 bg-slate-900 px-2 py-1 rounded">Pilih</span>
                            </div>`;
                    });
                } else {
                    html += `<p class="text-[11px] text-rose-400 italic text-center py-2">Video tidak ditemukan dari sumber asal.</p>`;
                }

                // Daftar Episode
                html += `
                        </div>
                        <div class="premium-glass rounded-xl overflow-hidden p-3">
                            <h4 class="text-xs font-bold text-indigo-400 mb-3 border-b border-slate-800 pb-2"><i class="fa-solid fa-list mr-1"></i> DAFTAR EPISODE</h4>
                            <div class="grid grid-cols-2 gap-2">
                `;
                
                if (data.episode_map.length > 0) {
                    data.episode_map.forEach(ep => {
                        html += `
                            <button onclick="requestVideo('${ep.link}')" class="bg-[#0b1329] hover:bg-[#121f42] border border-slate-850 p-2.5 rounded-xl text-left text-xs truncate text-slate-300 transition-all">
                                <i class="fa-solid fa-play text-[9px] text-indigo-400 mr-1"></i> ${ep.episode_node}
                            </button>`;
                    });
                } else {
                    html += `<p class="text-[11px] text-slate-500 italic col-span-2 text-center py-2">Tidak ada episode lain.</p>`;
                }
                
                html += `</div></div></div>`;
                grid.className = "grid grid-cols-1";
                grid.innerHTML = html;

            } else {
                // TAMPILAN GRID BERANDA / PENCARIAN
                titleText.innerText = data.meta.keyword_query.includes('http') ? "Rilis Donghua Terkini" : `Hasil: "${data.meta.keyword_query}"`;
                feedIcon.className = data.meta.keyword_query.includes('http') ? "fa-solid fa-bolt text-amber-500 text-xs" : "fa-solid fa-search text-indigo-400 text-xs";
                
                let html = "";
                if (data.grid_data.length > 0) {
                    data.grid_data.forEach(item => {
                        html += `
                            <div class="premium-glass rounded-2xl overflow-hidden border border-slate-900 flex flex-col justify-end min-h-[220px] p-3 relative group shadow-md cursor-pointer" onclick="requestVideo('${item.url_target}')">
                                <img src="${item.image_poster}" class="w-full h-full object-cover absolute inset-0 z-0 group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=400';">
                                <div class="absolute inset-0 bg-gradient-to-t from-[#040712] via-[#040712]/40 to-transparent z-10"></div>
                                <span class="absolute top-2 left-2 bg-indigo-600 text-[9px] font-extrabold px-1.5 py-0.5 rounded z-20 text-white shadow">${item.badge_episode}</span>
                                <div class="relative z-20">
                                    <h4 class="text-xs font-bold text-white mb-2 line-clamp-2 drop-shadow-md">${item.title}</h4>
                                    <button class="w-full bg-indigo-600/90 backdrop-blur py-2 rounded-xl text-[10px] font-bold text-white shadow-lg transition-all">Tonton Sekarang</button>
                                </div>
                            </div>`;
                    });
                } else {
                    html += `<div class="col-span-2 text-center py-10"><p class="text-xs text-slate-500 italic">Tidak ada data ditemukan.</p></div>`;
                }
                
                grid.className = "grid grid-cols-2 gap-3";
                grid.innerHTML = html;
            }
        }
    </script>
</body>
</html>
